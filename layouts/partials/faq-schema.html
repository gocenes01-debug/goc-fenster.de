<!-- Schema.org FAQPage -->
{{ if eq .Type "page" }}
  {{ if in .File.Path "faq" }}
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Welche Fenster sind am besten: Kunststoff, Alu oder Holz?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Das hängt von Ihren Prioritäten ab. Kunststoff-Fenster sind preiswert und pflegeleicht. Aluminium-Fenster sind extrem stabil mit modernem Design. Holz-Fenster haben die beste Wärmeisolation. Lassen Sie sich persönlich beraten."
          }
        },
        {
          "@type": "Question",
          "name": "Wie lange halten Fenster?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Bei richtiger Pflege halten moderne Fenster 30-50 Jahre je nach Material. Kunststoff: 30-40 Jahre, Aluminium: 40-50 Jahre, Holz: 20-30 Jahre. Wir geben 5 Jahre Garantie auf alle Fenster."
          }
        },
        {
          "@type": "Question",
          "name": "Sind 3-fach verglaste Fenster wirklich besser?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ja! 3-fach Verglasung bietet bessere Wärmeisolation (20-30% energieeffizienter), besseren Schallschutz und mehr Sicherheit. Die Mehrkosten von 10-15% rechnen sich durch Einsparungen beim Heizen."
          }
        },
        {
          "@type": "Question",
          "name": "Wie lange dauert die Fenstermontage?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Das hängt von Anzahl und Größe ab. 1 Fenster: 1-2 Stunden. 5 Fenster: 1 Tag. Ganze Haus: 2-3 Tage. Wir planen im Voraus und halten unsere Termine zuverlässig ein."
          }
        },
        {
          "@type": "Question",
          "name": "Kann ich die Fenster selbst einbauen?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nicht empfohlen! Falscher Einbau führt zu Wärmebrücken und Feuchtigkeitsproblemen. Professionelle Montage von Göc ist zuverlässig und garantiert. Nur ca. 50€ pro Fenster teurer."
          }
        },
        {
          "@type": "Question",
          "name": "Wie lange ist die Garantie?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Wir geben 5 Jahre Garantie auf Rahmen, Flügel, Beschläge und die Verarbeitung. Die Garantie umfasst nicht normalen Verschleiß oder falsche Bedienung."
          }
        },
        {
          "@type": "Question",
          "name": "Wie viel kosten neue Fenster?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Das hängt von Material, Größe und Ausstattung ab. Kunststoff-Fenster: 200-400€ pro Fenster. Alu-Fenster: 400-700€. Holz-Fenster: 500-900€. Plus Montage: 50-100€ pro Fenster. Kostenlose Angebote auf Anfrage."
          }
        },
        {
          "@type": "Question",
          "name": "Gibt es Förderungen für neue Fenster?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ja! Es gibt KfW-Förderung (bis 15.000€), BAFA-Zuschüsse und regionale Programme. Wir beraten Sie kostenlos zu verfügbaren Förderungen und helfen bei der Beantragung."
          }
        },
        {
          "@type": "Question",
          "name": "Wie viel Heizkosten spart man durch neue Fenster?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Bei alten Fenstern können Sie 20-30% Heizkosten sparen. Bei 100m² Fensterfläche und 1.000€ Heizkosten/Jahr sparen Sie 200-300€. Die Investition amortisiert sich in 7-10 Jahren."
          }
        },
        {
          "@type": "Question",
          "name": "Wie kontaktiere ich Göc Fenster?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Telefon: 07623 9995 (Mo-Fr 8-17 Uhr). WhatsApp: 0151 11628974. E-Mail: gocfensterbau@hotmail.de. Oder besuchen Sie uns: Jacob-Kaiser-Weg 3, 79618 Rheinfelden."
          }
        }
      ]
    }
    </script>
  {{ end }}
{{ end }}
