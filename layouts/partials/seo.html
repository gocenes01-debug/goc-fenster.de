<!-- SEO: Open Graph, Twitter Cards, Schema.org -->
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Site.Params.defaultDescription }}{{ . }}{{ end }}{{ end }}">
<meta name="keywords" content="{{ with .Keywords }}{{ delimit . ", " }}{{ else }}{{ with .Site.Params.defaultKeywords }}{{ delimit . ", " }}{{ end }}{{ end }}">

<!-- Open Graph -->
<meta property="og:title" content="{{ .Title }} — Göc Fenster Rheinfelden">
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Site.Params.defaultDescription }}{{ . }}{{ end }}{{ end }}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:image" content="{{ .Site.BaseURL }}{{ with .Params.image }}{{ . }}{{ else }}{{ .Site.Params.default_sharing_image }}{{ end }}">
<meta property="og:locale" content="de_DE">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ .Title }} — Göc Fenster Rheinfelden">
<meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Site.Params.defaultDescription }}{{ . }}{{ end }}{{ end }}">

<!-- Schema.org LocalBusiness with AggregateRating -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "LocalBusiness",
  "@id": "{{ .Site.BaseURL }}#business",
  "name": "Göc Fenster Rheinfelden",
  "image": "{{ .Site.BaseURL }}{{ .Site.Params.default_sharing_image }}",
  "description": "Meisterbetrieb für Fenster, Türen und Rollläden in Rheinfelden seit 2003",
  "address": {
    "@type": "PostalAddress",
    "streetAddress": "Jacob-Kaiser-Weg 3",
    "addressLocality": "Rheinfelden",
    "postalCode": "79618",
    "addressRegion": "BW",
    "addressCountry": "DE"
  },
  "geo": {
    "@type": "GeoCoordinates",
    "latitude": 47.5596,
    "longitude": 7.7886
  },
  "telephone": "+4976239995",
  "email": "gocfensterbau@hotmail.de",
  "url": "{{ .Site.BaseURL }}",
  "openingHours": "Mo-Fr 08:00-17:00",
  "priceRange": "€€",
  "areaServed": [
    {
      "@type": "City",
      "name": "Rheinfelden"
    },
    {
      "@type": "City",
      "name": "Lörrach"
    },
    {
      "@type": "City",
      "name": "Bad Säckingen"
    },
    {
      "@type": "City",
      "name": "Schopfheim"
    },
    {
      "@type": "City",
      "name": "Basel"
    }
  ]
}
</script>
