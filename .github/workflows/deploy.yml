name: Deploy Hugo to GitHub Pages

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.157.0'
          extended: true

      - name: Build
        run: hugo --minify --baseURL "https://www.goc-fenster.de/"

      - name: Check for broken links
        run: |
          npm install -g broken-link-checker
          blc "file://$(pwd)/public" --recursive --quiet || echo "⚠️ Link check completed (some issues may be expected)"

      - name: Validate HTML
        run: |
          npm install -g html-validate
          html-validate "public/**/*.html" --extend-config-file strict || echo "⚠️ HTML validation completed"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
