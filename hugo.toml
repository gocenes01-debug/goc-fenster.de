# =============================================================
# Göc Fenster Rheinfelden — Hugo Website Konfiguration
# =============================================================
baseurl = "https://www.goc-fenster.de/"
title = "Göc Fenster Rheinfelden"
theme = "hugo-universal"
languageCode = "de-de"
defaultContentLanguage = "de"

summaryLength = 70
pluralizelisttitles = false

[services]
  [services.googleAnalytics]
    id = ""  # GA4 via eigenes Template (nicht hier)

[pagination]
  pagerSize = 10

# ── Navigation ──────────────────────────────────────────────
[menu]
[[menu.main]]
  name = "Startseite"
  url = "/"
  weight = 1

[[menu.main]]
  name = "Leistungen"
  url = "/leistungen/"
  weight = 2

[[menu.main]]
  name = "Referenzen"
  url = "/referenzen/"
  weight = 3

[[menu.main]]
  name = "Über uns"
  url = "/ueber-uns/"
  weight = 4

[[menu.main]]
  name = "Angebot"
  url = "/angebot/"
  weight = 5

[[menu.main]]
  name = "Kontakt"
  url = "/kontakt/"
  weight = 6

# Topbar: Telefon immer sichtbar
[[menu.topbar]]
  weight = 1
  name = "07623 9995"
  url = "tel:+4976239995"
  pre = "<i class='fas fa-phone'></i>"

# ── SEO & Meta ──────────────────────────────────────────────
[params]
